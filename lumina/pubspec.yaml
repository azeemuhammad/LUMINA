name: lumina_ai
description: LUMINA - AI Photo Restoration App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  image: ^4.5.3
  path_provider: ^2.1.4
  http: ^1.2.2
  confetti: ^0.7.0
  fluttertoast: ^8.2.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/